- name: Install Filebeat
  hosts: web
  become: yes

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install apt-transport-https and gnupg2
      apt:
        name:
          - apt-transport-https
          - gnupg2
        state: present

    - name: Install Filebeat
      apt:
        deb: https://mirror.yandex.ru/mirrors/elastic/8/pool/main/f/filebeat/filebeat-8.19.14-amd64.deb
        state: present

    - name: Create filebeat configuration
      template:
        src: /home/anton/diplom/ansible/filebeat.yml
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: 0644

    - name: Start Filebeat
      service:
        name: filebeat
        state: started
        enabled: yes
