- name: Install Elasticsearch
  hosts: elastic
  become: yes

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install apt-transport-https and gnupg2
      apt:
        name:
          - apt-transport-https
          - gnupg2
        state: present

    - name: Install Elasticsearch
      apt:
        deb: https://mirror.yandex.ru/mirrors/elastic/8/pool/main/e/elasticsearch/elasticsearch-8.19.14-amd64.deb
        state: present

    - name: Start Elasticsearch
      service:
        name: elasticsearch
        state: started
        enabled: yes

    - name: Create Elasticsearch configuration
      template:
        src: /home/anton/diplom/ansible/elasticsearch.yml
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: root
        mode: '0644'
      notify: restart elasticsearch

  handlers:
   - name: restart elasticsearch
     systemd:
       name: elasticsearch
       state: restarted
